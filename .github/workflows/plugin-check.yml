name: Plugin Check

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          coverage: none
          tools: wp-cli

      - name: Stage plugin files
        run: |
          set -euo pipefail
          SLUG="health-endpoint"
          rm -rf build
          mkdir -p "build/${SLUG}"

          rsync -a ./ "build/${SLUG}/" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude 'build'

      - name: Install WordPress
        run: |
          set -euo pipefail
          mkdir -p /tmp/wordpress
          cd /tmp/wordpress

          wp core download --allow-root
          wp config create \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --allow-root
          wp core install \
            --url=http://localhost \
            --title="Plugin Check" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=admin@example.com \
            --skip-email \
            --allow-root

      - name: Install plugins
        run: |
          set -euo pipefail
          cp -R "$GITHUB_WORKSPACE/build/health-endpoint" /tmp/wordpress/wp-content/plugins/health-endpoint

          cd /tmp/wordpress
          wp plugin install plugin-check --activate --allow-root
          wp plugin activate health-endpoint --allow-root

      - name: Run WordPress Plugin Check
        run: |
          set -euo pipefail
          cd /tmp/wordpress

          wp plugin list --allow-root
          wp plugin list-checks --allow-root
          wp plugin list-check-categories --allow-root

          wp plugin check health-endpoint \
            --format=json \
            --categories=accessibility,general,performance,plugin_repo,security \
            --require=./wp-content/plugins/plugin-check/cli.php \
            --allow-root \
            > "$RUNNER_TEMP/plugin-check-results.json"

          cat "$RUNNER_TEMP/plugin-check-results.json"

          php <<'PHP'
          <?php
          $result_file = getenv( 'RUNNER_TEMP' ) . '/plugin-check-results.json';
          $lines       = file( $result_file, FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES );
          $errors      = 0;

          foreach ( $lines as $line ) {
              $line = trim( $line );

              if ( '' === $line || '[' !== $line[0] ) {
                  continue;
              }

              $items = json_decode( $line, true );

              if ( ! is_array( $items ) ) {
                  continue;
              }

              foreach ( $items as $item ) {
                  if ( isset( $item['type'] ) && 'ERROR' === $item['type'] ) {
                      ++$errors;
                  }
              }
          }

          if ( $errors > 0 ) {
              fwrite( STDERR, "Plugin Check reported {$errors} error(s).\n" );
              exit( 1 );
          }

          fwrite( STDOUT, "Plugin Check reported no errors.\n" );
          PHP

      - name: Upload Plugin Check results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-results
          path: ${{ runner.temp }}/plugin-check-results.json
          if-no-files-found: ignore
